  <rect width="512" height="512" rx="110" fill="url(#dark-bg-gradient)"/>
  
  <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-size="280" font-family="system-ui, -apple-system, sans-serif" font-weight="800" fill="url(#light-text-gradient)" letter-spacing="-8">ltr</text>

  <rect x="42%" y="75%" width="16%" height="2.5%" rx="6" fill="#ea580c" />
